version: 1.0.0
# Devices Configuration for Seeed XIAO ESP32-S3 Sense
#
# Phase 1 (current): chat + listen, bare board.
#   - audio_adc → on-board PDM mic (real)
#   - audio_dac → fake placeholder so framework dependencies resolve
#                 even with no amp wired yet. Swap to a real codec
#                 entry (e.g. dummy_dac on i2s_audio_out) once the
#                 MAX98357 is installed.
#   - led_strip → init_skip placeholder for an external WS2812
#
# Phase 2 (touchscreen + speaker):
#   - add display_lcd: ili9341 (or st7789) over a new spi_display peripheral
#   - flip audio_dac to chip: dummy and drive i2s_audio_out
#   - optional: enable on-board OV2640 camera (DVP) for vision tools
devices:

  - name: led_strip
    chip: ws2812
    type: custom
    version: default
    init_skip: true
    dependencies:
      espressif/led_strip:
        version: "^3.0"
        public: true
    config:
      max_leds: 1
    peripherals:
      - name: rmt_tx

  # Placeholder mic device. PDM driver writes raw 16-bit PCM into the
  # esp-claw audio pipeline; no codec IC is involved.
  - name: audio_adc
    type: custom
    version: default
    init_skip: true
    config:
      sample_rate_hz: 16000
    peripherals:
      - name: i2s_audio_in

  # Placeholder DAC so audio_codec dependencies resolve even when no
  # amplifier is connected. Replace with a real codec (e.g. chip: dummy
  # or chip: ns4168) once the MAX98357 is wired.
  - name: fake_audio_dac
    chip: none
    type: audio_codec
    version: default
    init_skip: true
    peripherals:
      - name: i2s_audio_out

  # On-board camera over DVP 8-bit. SCCB rides on a dedicated I2C bus
  # (i2c_master_cam, port 1) on GPIO40/39 — NOT on the user I2C
  # (port 0, GPIO5/6) so the touchscreen/sensors stay isolated.
  # XIAO ESP32-S3 Sense pinout (camera DVP):
  #   VSYNC=38  HREF=47  PCLK=13  XCLK=10  PWDN=-1  RESET=-1
  #   D7=48  D6=11  D5=12  D4=14  D3=16  D2=18  D1=17  D0=15
  #
  # Sensor: 2026 production XIAO Sense units ship with the OV3660 (3MP)
  # at SCCB 0x3C, NOT the OV2640 (2MP) at 0x30 shown in older Seeed
  # wiki diagrams. We enable CONFIG_CAMERA_OV3660 in
  # sdkconfig.defaults.board accordingly.
  # XCLK = 20 MHz. The OV3660 esp_cam_sensor reg tables are all named
  # `20Minput_*` and the header sets OV3660_XCLK_DEFAULT to 20 MHz —
  # any other input frequency miscalibrates the sensor's PLL and the
  # LCD_CAM DMA engine watchdog-resets the chip within seconds (boot
  # loop, USB CDC dies, esptool can't reconnect). Source:
  # github.com/espressif/esp-video-components ov3660.c hardcoded reg
  # tables + Khangura's 2026-02 working write-up on this exact board.
  - name: camera
    type: camera
    sub_type: dvp
    version: default
    config:
      dvp_config:
        reset_io: -1
        pwdn_io: -1
        vsync_io: 38
        de_io: 47
        pclk_io: 13
        xclk_io: 10
        xclk_freq: 20000000
        data_width: CAM_CTLR_DATA_WIDTH_8
        data_io:
          data_io_0: 15
          data_io_1: 17
          data_io_2: 18
          data_io_3: 16
          data_io_4: 14
          data_io_5: 12
          data_io_6: 11
          data_io_7: 48
          data_io_8: -1
          data_io_9: -1
          data_io_10: -1
          data_io_11: -1
          data_io_12: -1
          data_io_13: -1
          data_io_14: -1
          data_io_15: -1
    peripherals:
      - name: i2c_master_cam
        frequency: 100000
