name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  repo-checks:
    name: Repo checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Shell syntax
        run: bash -n scripts/*.sh
      - name: Dashboard JavaScript syntax
        run: node scripts/check-dashboard-js.mjs dashboard/index.html dashboard/onboard.html
      - name: Patch artifact check
        run: ./scripts/check-patches.sh
      - name: Secret pattern scan
        run: ./scripts/check-secrets.sh

  android:
    name: Android build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"
      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;34.0.0"
      - name: Assemble Android app
        working-directory: android
        run: gradle :app:assembleDebug :app:testDebugUnitTest :app:compileDebugAndroidTestKotlin :app:lintDebug
