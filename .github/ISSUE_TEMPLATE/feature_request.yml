name: Feature request
description: Suggest an improvement or new capability.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or hardware workflow should this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the desired behavior.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Firmware
        - Dashboard
        - Android
        - Hardware
        - Documentation
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Include links, diagrams, protocol ideas, or hardware constraints.
