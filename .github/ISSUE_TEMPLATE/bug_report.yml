name: Bug report
description: Report a firmware, dashboard, Android, or hardware issue.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Firmware
        - Dashboard
        - Android
        - Hardware
        - Documentation
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Include commands, URLs, wiring, and browser/phone details.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Remove Wi-Fi passwords, API keys, bot tokens, and private paths.
      render: text
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Board, host OS, browser, Android phone/version, firmware commit.
    validations:
      required: true
