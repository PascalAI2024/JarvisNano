<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="white"/>
  <rect x="0" y="0" width="800" height="600" fill="none" stroke="#000" stroke-width="0.8"/>
  <line x1="0" y1="560" x2="800" y2="560" stroke="#000" stroke-width="0.8"/>
  <text x="10" y="575" font-family="system-ui, sans-serif" font-size="11" font-weight="bold">J.A.R.V.I.S. Enclosure — Concept 3: Egg</text>
  <text x="10" y="590" font-family="system-ui, sans-serif" font-size="9">All dimensions in mm. Walls 2 mm. FDM: 0.4 mm nozzle, 0.2 mm layer. Print equator face down, both halves. Tree supports at base corners.</text>
  <text x="600" y="575" font-family="system-ui, sans-serif" font-size="9">Rev A</text>
  <text x="600" y="590" font-family="system-ui, sans-serif" font-size="9">Scale: approx 3.8:1</text>

  <!-- FRONT VIEW: 72 x 68 mm, scale 3.8 => 273.6 x 258.4 -->
  <text x="50" y="25" font-family="system-ui, sans-serif" font-size="10" font-weight="bold">FRONT VIEW</text>
  <!-- Egg outline approximated with ellipse-like shape using bezier path -->
  <!-- Center at (192, 169), rx=136.8, top narrower -->
  <path d="M192,40 C310,40 328,130 328,170 C328,250 290,298 192,298 C94,298 56,250 56,170 C56,130 74,40 192,40 Z"
        fill="none" stroke="#000" stroke-width="0.8"/>

  <!-- Equator line at Z=28 mm => from base y=298, equator y = 298 - 28*3.8 = 298-106.4 = 191.6 -->
  <line x1="70" y1="191.6" x2="314" y2="191.6" stroke="#555" stroke-width="0.4" stroke-dasharray="5,3"/>
  <text x="320" y="194" font-family="system-ui, sans-serif" font-size="7">equator Z=28</text>

  <!-- Display cutout: 39 mm dia, center at Z=25mm*3.8=95 from base => y=298-95=203 -->
  <circle cx="192" cy="203" r="74.1" fill="none" stroke="#000" stroke-width="0.5" stroke-dasharray="4,2"/>
  <circle cx="192" cy="203" r="1.5" fill="#000"/>
  <text x="196" y="206" font-family="system-ui, sans-serif" font-size="7">dia 39</text>

  <!-- Speaker grille: top dome, perforations -->
  <text x="152" y="75" font-family="system-ui, sans-serif" font-size="7">speaker grille (top dome)</text>
  <circle cx="172" cy="90" r="2.5" fill="#ccc" stroke="#000" stroke-width="0.3"/>
  <circle cx="183" cy="90" r="2.5" fill="#ccc" stroke="#000" stroke-width="0.3"/>
  <circle cx="194" cy="90" r="2.5" fill="#ccc" stroke="#000" stroke-width="0.3"/>
  <circle cx="205" cy="90" r="2.5" fill="#ccc" stroke="#000" stroke-width="0.3"/>
  <circle cx="172" cy="101" r="2.5" fill="#ccc" stroke="#000" stroke-width="0.3"/>
  <circle cx="183" cy="101" r="2.5" fill="#ccc" stroke="#000" stroke-width="0.3"/>
  <circle cx="194" cy="101" r="2.5" fill="#ccc" stroke="#000" stroke-width="0.3"/>
  <circle cx="205" cy="101" r="2.5" fill="#ccc" stroke="#000" stroke-width="0.3"/>

  <!-- USB-C at front near equator -->
  <rect x="150" y="172" width="36.1" height="17.1" fill="#ddd" stroke="#000" stroke-width="0.5"/>
  <text x="152" y="169" font-family="system-ui, sans-serif" font-size="7">USB-C 9.5x4.5</text>

  <!-- Mic port -->
  <circle cx="197" cy="180" r="3.4" fill="none" stroke="#000" stroke-width="0.5"/>
  <text x="202" y="183" font-family="system-ui, sans-serif" font-size="6">mic o1.8</text>

  <!-- Dimensions width 72 -->
  <line x1="56" y1="315" x2="328" y2="315" stroke="#000" stroke-width="0.3"/>
  <line x1="56" y1="310" x2="56" y2="320" stroke="#000" stroke-width="0.3"/>
  <line x1="328" y1="310" x2="328" y2="320" stroke="#000" stroke-width="0.3"/>
  <text x="192" y="327" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">72</text>

  <!-- Dimensions height 68 -->
  <line x1="345" y1="40" x2="345" y2="298" stroke="#000" stroke-width="0.3"/>
  <line x1="340" y1="40" x2="350" y2="40" stroke="#000" stroke-width="0.3"/>
  <line x1="340" y1="298" x2="350" y2="298" stroke="#000" stroke-width="0.3"/>
  <text x="360" y="173" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">68</text>

  <!-- Equator dimension label -->
  <line x1="56" y1="191.6" x2="46" y2="191.6" stroke="#000" stroke-width="0.3"/>
  <line x1="56" y1="298" x2="46" y2="298" stroke="#000" stroke-width="0.3"/>
  <line x1="46" y1="191.6" x2="46" y2="298" stroke="#000" stroke-width="0.3"/>
  <text x="20" y="250" font-family="system-ui, sans-serif" font-size="7" text-anchor="middle">28</text>

  <!-- TOP VIEW: 72 x 62 mm => 273.6 x 235.6 -->
  <text x="420" y="25" font-family="system-ui, sans-serif" font-size="10" font-weight="bold">TOP VIEW (equator section)</text>
  <!-- Egg top-down is approximately ellipse -->
  <ellipse cx="564" cy="175" rx="136.8" ry="117.8" fill="none" stroke="#000" stroke-width="0.8"/>

  <!-- Battery outline -->
  <rect x="465" y="130" width="197.6" height="133" fill="none" stroke="#000" stroke-width="0.5" stroke-dasharray="4,2"/>
  <text x="510" y="200" font-family="system-ui, sans-serif" font-size="7">BATTERY 52x35</text>

  <!-- AMP+SPK -->
  <rect x="465" y="40" width="190" height="114" fill="none" stroke="#888" stroke-width="0.4" stroke-dasharray="3,2"/>
  <text x="480" y="100" font-family="system-ui, sans-serif" font-size="7">AMP+SPK 50x30</text>

  <!-- XIAO -->
  <rect x="524" y="48" width="79.8" height="66.5" fill="none" stroke="#000" stroke-width="0.5"/>
  <text x="535" y="83" font-family="system-ui, sans-serif" font-size="7">XIAO 21x17.5</text>

  <!-- Dim width 72 -->
  <line x1="427.2" y1="310" x2="700.8" y2="310" stroke="#000" stroke-width="0.3"/>
  <line x1="427.2" y1="305" x2="427.2" y2="315" stroke="#000" stroke-width="0.3"/>
  <line x1="700.8" y1="305" x2="700.8" y2="315" stroke="#000" stroke-width="0.3"/>
  <text x="564" y="322" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">72</text>

  <!-- Dim depth 62 -->
  <line x1="710" y1="57.2" x2="710" y2="292.8" stroke="#000" stroke-width="0.3"/>
  <line x1="705" y1="57.2" x2="715" y2="57.2" stroke="#000" stroke-width="0.3"/>
  <line x1="705" y1="292.8" x2="715" y2="292.8" stroke="#000" stroke-width="0.3"/>
  <text x="726" y="178" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">62</text>

  <!-- SIDE VIEW -->
  <text x="50" y="345" font-family="system-ui, sans-serif" font-size="10" font-weight="bold">SIDE VIEW (right)</text>
  <!-- Egg side: 62 wide x 68 tall, ellipse-like -->
  <path d="M192,360 C270,360 280,420 280,430 C280,490 255,540 192,540 C129,540 104,490 104,430 C104,420 114,360 192,360 Z"
        fill="none" stroke="#000" stroke-width="0.8"/>

  <!-- Equator -->
  <line x1="112" y1="433" x2="272" y2="433" stroke="#555" stroke-width="0.4" stroke-dasharray="4,2"/>
  <text x="278" y="436" font-family="system-ui, sans-serif" font-size="7">equator</text>

  <!-- Layer zones in side view -->
  <text x="130" y="520" font-family="system-ui, sans-serif" font-size="7">BAT 6mm</text>
  <text x="130" y="480" font-family="system-ui, sans-serif" font-size="7">SPK 18mm</text>
  <text x="130" y="420" font-family="system-ui, sans-serif" font-size="7">XIAO</text>
  <text x="130" y="395" font-family="system-ui, sans-serif" font-size="7">dome</text>

  <!-- Dim height 68 -->
  <line x1="295" y1="360" x2="295" y2="540" stroke="#000" stroke-width="0.3"/>
  <line x1="290" y1="360" x2="300" y2="360" stroke="#000" stroke-width="0.3"/>
  <line x1="290" y1="540" x2="300" y2="540" stroke="#000" stroke-width="0.3"/>
  <text x="310" y="453" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">68</text>

  <!-- Dim width 62 -->
  <line x1="104" y1="553" x2="280" y2="553" stroke="#000" stroke-width="0.3"/>
  <line x1="104" y1="548" x2="104" y2="558" stroke="#000" stroke-width="0.3"/>
  <line x1="280" y1="548" x2="280" y2="558" stroke="#000" stroke-width="0.3"/>
  <text x="192" y="565" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">62</text>

  <!-- ISOMETRIC -->
  <text x="420" y="345" font-family="system-ui, sans-serif" font-size="10" font-weight="bold">ISOMETRIC (schematic)</text>
  <!-- Simplified egg iso — two ellipses connected -->
  <ellipse cx="570" cy="490" rx="120" ry="60" fill="none" stroke="#000" stroke-width="0.8"/>
  <ellipse cx="570" cy="390" rx="95" ry="48" fill="none" stroke="#000" stroke-width="0.8"/>
  <line x1="450" y1="490" x2="475" y2="390" stroke="#000" stroke-width="0.8"/>
  <line x1="690" y1="490" x2="665" y2="390" stroke="#000" stroke-width="0.8"/>
  <!-- Equator dashed -->
  <ellipse cx="570" cy="450" rx="118" ry="56" fill="none" stroke="#555" stroke-width="0.4" stroke-dasharray="5,3"/>
  <text x="696" y="453" font-family="system-ui, sans-serif" font-size="7">equator</text>
  <!-- Display circle on front -->
  <ellipse cx="490" cy="465" rx="45" ry="48" fill="none" stroke="#000" stroke-width="0.4" stroke-dasharray="3,2"/>
  <!-- Grille dots top -->
  <circle cx="555" cy="378" r="2" fill="#bbb" stroke="#000" stroke-width="0.3"/>
  <circle cx="566" cy="378" r="2" fill="#bbb" stroke="#000" stroke-width="0.3"/>
  <circle cx="577" cy="378" r="2" fill="#bbb" stroke="#000" stroke-width="0.3"/>
  <circle cx="588" cy="378" r="2" fill="#bbb" stroke="#000" stroke-width="0.3"/>
  <text x="435" y="515" font-family="system-ui, sans-serif" font-size="8">72 x 62 x 68 mm</text>
  <text x="435" y="527" font-family="system-ui, sans-serif" font-size="8">4x M2 at equator | smallest footprint</text>
</svg>
